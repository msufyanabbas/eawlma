  <!-- Gold star -->
  <path d="M20 11.4 l0.55 1.65 1.7 0.05 -1.35 1.05 0.5 1.7 -1.4 -1.0 -1.4 1.0 0.5 -1.7 -1.35 -1.05 1.7 -0.05 z"
        fill="#D4A843"/>

  <!-- Door + windows -->
  <rect x="18.2" y="25" width="3.6" height="7" rx="1.4" fill="#FAFAF8"/>
  <rect x="13.2" y="24" width="3" height="3" rx="0.5" fill="#FAFAF8" opacity="0.95"/>
  <rect x="23.8" y="24" width="3" height="3" rx="0.5" fill="#FAFAF8" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="46" y="27"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="20"
        font-weight="800"
        letter-spacing="-0.4"
        fill="#1A1A2E">Eawlma</text>
