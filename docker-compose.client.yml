version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eawlma
      POSTGRES_USER: eawlma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eawlma_secure_2024}
    volumes:
      - eawlma_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eawlma"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eawlma_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_2024}
    volumes:
      - eawlma_redis:/data
    networks:
      - eawlma_net

  backend:
    image: eawlma-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3010
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: eawlma
      DB_PASSWORD: ${DB_PASSWORD:-eawlma_secure_2024}
      DB_NAME: eawlma
      DATABASE_URL: postgresql://eawlma:${DB_PASSWORD:-eawlma_secure_2024}@postgres:5432/eawlma
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_2024}
      JWT_SECRET: ${JWT_SECRET:-change_me_32_chars_minimum_please}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_32_chars}
      JWT_REFRESH_EXPIRES_IN: 30d
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-me-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      RUN_MIGRATIONS: "true"
    ports:
      - "3010:3010"
    networks:
      - eawlma_net

  frontend:
    image: eawlma-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - eawlma_net

volumes:
  eawlma_postgres:
  eawlma_redis:

networks:
  eawlma_net:
    driver: bridge
