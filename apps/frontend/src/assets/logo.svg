<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Eawlma logo">
  <defs>
    <linearGradient id="eawlmaLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63A6"/>
      <stop offset="100%" stop-color="#4A4080"/>
    </linearGradient>
  </defs>

  <!-- Bold pin-shaped house silhouette: pointed roof + rounded body that
       evokes a map location pin. Clean lavender fill, no inner detail. -->
  <path
    d="M24 4
       L41 19
       L41 36
       Q41 40 37 40
       L31 40
       L24 46
       L17 40
       L11 40
       Q7 40 7 36
       L7 19 Z"
    fill="url(#eawlmaLavender)"/>

  <!-- Gold roof peak accent (sharp triangle on top of the apex) -->
  <path
    d="M24 4
       L29 9
       L19 9 Z"
    fill="#D4A843"/>

  <!-- Bold filled door (lavender deep + gold trim) — the focal point -->
  <rect x="20.5" y="24" width="7" height="13" rx="2"
        fill="#FFFFFF"/>
  <rect x="22" y="26" width="4" height="9" rx="1.4"
        fill="#D4A843"/>
</svg>
