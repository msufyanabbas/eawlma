<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="eawlma logo">
  <defs>
    <linearGradient id="eawlmaLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63A6"/>
      <stop offset="100%" stop-color="#4A4080"/>
    </linearGradient>
  </defs>

  <!-- Rounded square plate -->
  <rect x="0" y="0" width="40" height="40" rx="10" ry="10" fill="url(#eawlmaLavender)"/>

  <!-- Geometric arabesque motif: an "ew" monogram fused with an Islamic 8-point star outline -->
  <!-- Outer 8-point star (subtle, decorative) -->
  <path
    d="M20 5
       L23 12 L31 12.5 L25.5 17.5 L29 24.5 L20 22.5 L11 24.5 L14.5 17.5 L9 12.5 L17 12 Z"
    fill="none"
    stroke="#D4A843"
    stroke-width="0.8"
    stroke-linejoin="round"
    opacity="0.55"/>

  <!-- "e" — open ring with hinted arabic kashida tail -->
  <path
    d="M14 24
       a4 4 0 1 1 8 0
       h-7"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- "w" — short flowing wave under the e (kashida-style baseline) -->
  <path
    d="M13 30
       q2 -2.4 4 0
       t4 0
       t4 0"
    fill="none"
    stroke="#D4A843"
    stroke-width="2"
    stroke-linecap="round"/>
</svg>
