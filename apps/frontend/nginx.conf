# -----------------------------------------------------------------------------
# Eawlma Frontend — nginx config for the production-built SPA + reverse proxy
# to the backend. Mounted at /etc/nginx/conf.d/default.conf inside the
# `Eawlma-frontend` container.
# -----------------------------------------------------------------------------

upstream backend {
    server backend:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Performance + security defaults
    server_tokens off;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Static assets — long-lived cache ──────────────────────────────────
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── API reverse proxy (REST + Swagger) ────────────────────────────────
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Socket.IO (WebSocket upgrade) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ─── SPA fallback — any unknown path returns index.html so client-side
    #     routing (TanStack Router) handles the URL. ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
