<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Eawlma logo">
  <defs>
    <linearGradient id="eawlmaLavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63A6"/>
      <stop offset="100%" stop-color="#4A4080"/>
    </linearGradient>
  </defs>

  <!-- Globe arc behind the house — meridians + a horizon curve -->
  <g transform="translate(20 22)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#6C63A6" stroke-width="1.4" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#6C63A6" stroke-width="1" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="5" ry="14" fill="none" stroke="#6C63A6" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Stylised house silhouette (front-facing, gabled roof) -->
  <g fill="url(#eawlmaLavender)">
    <!-- Body -->
    <path d="M11 22 L20 14 L29 22 L29 31 Q29 32 28 32 L12 32 Q11 32 11 31 Z"/>
  </g>

  <!-- Roof gold accent (left fascia) -->
  <path
    d="M11.5 22 L20 14.4 L28.5 22"
    fill="none"
    stroke="#D4A843"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Gold star atop the roof apex -->
  <path
    d="M20 11.4 l0.55 1.65 1.7 0.05 -1.35 1.05 0.5 1.7 -1.4 -1.0 -1.4 1.0 0.5 -1.7 -1.35 -1.05 1.7 -0.05 z"
    fill="#D4A843"/>

  <!-- Door cut-out -->
  <rect x="18.2" y="25" width="3.6" height="7" rx="1.4" fill="#FAFAF8"/>
  <!-- Window cut-out -->
  <rect x="13.2" y="24" width="3" height="3" rx="0.5" fill="#FAFAF8" opacity="0.95"/>
  <rect x="23.8" y="24" width="3" height="3" rx="0.5" fill="#FAFAF8" opacity="0.95"/>
</svg>
