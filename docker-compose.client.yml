services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eawlma
      POSTGRES_USER: eawlma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eawlma_secure_2024}
    volumes:
      - eawlma_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eawlma"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eawlma_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_2024}
    volumes:
      - eawlma_redis:/data
    networks:
      - eawlma_net

  backend:
    image: eawlma-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3010
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: eawlma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eawlma_secure_2024}
      POSTGRES_DB: eawlma
      POSTGRES_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_2024}
      REDIS_DB: 0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_min_32_chars_long_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_too_in_production_min_32_chars_long}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-me-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      RUN_MIGRATIONS: "true"
    ports:
      - "3010:3010"
    networks:
      - eawlma_net

  frontend:
    image: eawlma-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - eawlma_net

volumes:
  eawlma_postgres:
  eawlma_redis:

networks:
  eawlma_net:
    driver: bridge
